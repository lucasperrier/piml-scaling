system:
  alpha: 1.5
  beta: 1.0
  delta: 1.0
  gamma: 3.0
solver:
  method: DOP853
  rtol: 1.0e-09
  atol: 1.0e-11
data:
  T: 1.0
  x0_low: 0.5
  x0_high: 2.5
  y0_low: 0.5
  y0_high: 2.5
  train_pool: 512
  val_size: 128
  test_size: 128
  dataset_sizes:
  - 64
  - 128
  - 256
  data_seeds:
  - 11
model:
  activation: relu
  hidden_widths:
  - 32
  - 32
train:
  lr: 0.001
  weight_decay: 1.0e-06
  batch_size_cap: 128
  max_epochs: 60
  early_stopping_patience: 10
  lambda_phys: 0.1
  train_seeds:
  - 101
  - 202
out_dir: runs-pilot
